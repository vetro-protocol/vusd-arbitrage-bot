# This file is intended for LOCAL DEVELOPMENT USE ONLY.
#
# Runs both products as independent containers from a single shared image.
# Each reads its own env file — create .env.vusd and .env.vetbtc first.
#
#   docker compose up -d --build      # start both
#   docker compose logs -f vetbtc     # tail one product
#   docker compose down               # stop both

services:
  vusd:
    build: .
    env_file: .env.vusd
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    ulimits:
      nofile:
        soft: 1024
        hard: 1024
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  vetbtc:
    build: .
    env_file: .env.vetbtc
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    ulimits:
      nofile:
        soft: 1024
        hard: 1024
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
